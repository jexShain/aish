name: 功能请求
description: 提出新功能或改进建议
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        感谢提出建议！请描述具体的使用场景和需求。
  - type: textarea
    id: summary
    attributes:
      label: 功能概述
      description: 一句话描述你想要的功能
      placeholder: 支持流式输出 AI 响应
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: 使用场景
      description: 描述你遇到的问题或需求
      placeholder: 当前长响应时界面看起来像卡住了，没有任何反馈
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: 期望方案
      description: 你期望如何解决这个问题
      placeholder: 实时显示 AI 生成的内容
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      description: 你考虑过的其他解决方案
  - type: textarea
    id: additional
    attributes:
      label: 补充信息
      description: 其他参考信息、截图或链接
