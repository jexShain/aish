name: Release Preparation

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Target stable release version, for example 0.2.0"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-preparation-${{ github.event.inputs.version }}
  cancel-in-progress: true

jobs:
  release-meta:
    name: Compute release metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.metadata.outputs.version }}
      tag: ${{ steps.metadata.outputs.tag }}
      previous_stable_tag: ${{ steps.metadata.outputs.previous_stable_tag }}
      release_notes: ${{ steps.metadata.outputs.release_notes }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute release metadata
        id: metadata
        uses: ./.github/actions/release-metadata
        with:
          version: ${{ github.event.inputs.version }}
          artifact_prefix: release-preparation

  prepare-release:
    name: Summarize release preparation output
    needs: release-meta
    runs-on: ubuntu-latest
    outputs:
      version: ${{ needs.release-meta.outputs.version }}
      tag: ${{ needs.release-meta.outputs.tag }}
      previous_stable_tag: ${{ needs.release-meta.outputs.previous_stable_tag }}
    steps:
      - name: Write job summary
        run: |
          cat <<'EOF' >> "$GITHUB_STEP_SUMMARY"
          # Release Preparation Ready

          - Version: ${{ needs.release-meta.outputs.version }}
          - Tag: ${{ needs.release-meta.outputs.tag }}
          - Previous stable tag: ${{ needs.release-meta.outputs.previous_stable_tag || 'none' }}

          ## Release Notes

          ${{ needs.release-meta.outputs.release_notes }}
          EOF

  dry-run-package-validation:
    name: Dry-run package validation
    needs: release-meta
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Cache Cargo artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-musl-cargo-v1-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            linux-musl-cargo-v1-

      - name: Build release binary
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Build bundle
        run: |
          VERSION="${{ needs.release-meta.outputs.version }}"
          OUTPUT_DIR="artifacts/amd64"
          VERSION="$VERSION" PLATFORM="linux" ARCH="x86_64" OUTPUT_DIR="$OUTPUT_DIR" ./packaging/build_bundle.sh
          ls -lah "$OUTPUT_DIR"

      - name: Smoke test bundle install
        run: |
          VERSION="${{ needs.release-meta.outputs.version }}"
          OUTPUT_DIR="artifacts/amd64"
          BUNDLE="aish-${VERSION}-linux-x86_64"
          EXTRACT_DIR="$PWD/build/install-smoke"
          INSTALL_ROOT="$PWD/build/install-root"

          rm -rf "$EXTRACT_DIR" "$INSTALL_ROOT"
          mkdir -p "$EXTRACT_DIR" "$INSTALL_ROOT"

          tar -xzf "$OUTPUT_DIR/${BUNDLE}.tar.gz" -C "$EXTRACT_DIR"
          AISH_INSTALL_ROOT="$INSTALL_ROOT" AISH_SKIP_SYSTEMD=1 "$EXTRACT_DIR/${BUNDLE}/install.sh"

          test -x "$INSTALL_ROOT/usr/local/bin/aish"
          test -x "$INSTALL_ROOT/usr/local/bin/aish-sandbox"
          test -f "$INSTALL_ROOT/etc/aish/security_policy.yaml"

      - name: Upload dry-run artifacts
        uses: actions/upload-artifact@v6
        with:
          name: release-preparation-aish-linux-amd64
          path: artifacts/amd64/*
          if-no-files-found: error

  release-preparation-summary:
    name: Summarize release preparation validation
    needs:
      - release-meta
      - prepare-release
      - dry-run-package-validation
    runs-on: ubuntu-latest
    steps:
      - name: Write final summary
        run: |
          cat <<'EOF' >> "$GITHUB_STEP_SUMMARY"
          # Release Preparation Complete

          - Version: ${{ needs.release-meta.outputs.version }}
          - Tag: ${{ needs.release-meta.outputs.tag }}
          - Previous stable tag: ${{ needs.release-meta.outputs.previous_stable_tag || 'none' }}

          Release metadata artifacts and dry-run bundle validation have completed successfully.
          EOF
