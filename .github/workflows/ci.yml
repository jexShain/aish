name: CI

on:
  pull_request:
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  push:
    branches:
      - main
      - rust
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  CARGO_TERM_COLOR: always
  CACHE_KEY_SUFFIX: v1

jobs:
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    outputs:
      code: ${{ github.event_name == 'pull_request' && steps.filter.outputs.code || steps.default.outputs.code }}
      packaging: ${{ github.event_name == 'pull_request' && steps.filter.outputs.packaging || steps.default.outputs.packaging }}
    steps:
      - name: Default to full validation outside PRs
        id: default
        if: github.event_name != 'pull_request'
        run: |
          echo "code=true" >> "$GITHUB_OUTPUT"
          echo "packaging=true" >> "$GITHUB_OUTPUT"

      - name: Classify pull request changes
        id: filter
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            code:
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.github/workflows/ci.yml'
            packaging:
              - 'packaging/**'
              - 'debian/**'
              - 'config/**'
              - '.github/workflows/ci.yml'
              - '.github/workflows/release.yml'
              - '.github/workflows/release-preparation.yml'

  lint-test:
    name: Lint and test
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.code == 'true' || needs.changes.outputs.packaging == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ env.CACHE_KEY_SUFFIX }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ env.CACHE_KEY_SUFFIX }}-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --workspace

      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools && rustup target add x86_64-unknown-linux-musl

      - name: Build release binary
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Upload release binary
        uses: actions/upload-artifact@v6
        with:
          name: aish-linux-amd64
          path: target/x86_64-unknown-linux-musl/release/aish
          if-no-files-found: error

  cross-platform-smoke:
    name: Cross-platform smoke (${{ matrix.os }})
    needs:
      - changes
      - lint-test
    if: github.event_name != 'pull_request' || needs.changes.outputs.code == 'true' || needs.changes.outputs.packaging == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ env.CACHE_KEY_SUFFIX }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ env.CACHE_KEY_SUFFIX }}-

      - name: Build release
        run: cargo build --release

      - name: Smoke test binary
        run: ./target/release/aish --help

  build-bundle:
    name: Build bundle (${{ matrix.arch }})
    if: github.event_name != 'pull_request' || needs.changes.outputs.packaging == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runs_on: ubuntu-latest
            target: x86_64-unknown-linux-musl
    runs-on: ${{ matrix.runs_on }}
    needs:
      - changes
      - lint-test
      - cross-platform-smoke

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Cache Cargo artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ env.CACHE_KEY_SUFFIX }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-${{ env.CACHE_KEY_SUFFIX }}-

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare bundle archive
        run: |
          VERSION="0.0.0+${GITHUB_SHA::8}"
          OUTPUT_DIR="artifacts/${{ matrix.arch }}"
          mkdir -p "$OUTPUT_DIR"
          cp target/${{ matrix.target }}/release/aish "$OUTPUT_DIR/aish"
          tar -czf "$OUTPUT_DIR/aish-${VERSION}-linux-${{ matrix.arch }}.tar.gz" -C "$OUTPUT_DIR" aish

      - name: Smoke test binary
        run: |
          artifacts/${{ matrix.arch }}/aish --help

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v6
        with:
          name: aish-linux-${{ matrix.arch }}
          path: |
            artifacts/${{ matrix.arch }}/*
          if-no-files-found: error
