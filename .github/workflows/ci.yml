name: CI

on:
  pull_request:
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  push:
    branches:
      - main
      - rust
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  CARGO_TERM_COLOR: always
  CACHE_KEY_SUFFIX: v1

jobs:
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    outputs:
      code: ${{ github.event_name == 'pull_request' && steps.filter.outputs.code || steps.default.outputs.code }}
      packaging: ${{ github.event_name == 'pull_request' && steps.filter.outputs.packaging || steps.default.outputs.packaging }}
    steps:
      - name: Default to full validation outside PRs
        id: default
        if: github.event_name != 'pull_request'
        run: |
          echo "code=true" >> "$GITHUB_OUTPUT"
          echo "packaging=true" >> "$GITHUB_OUTPUT"

      - name: Classify pull request changes
        id: filter
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            code:
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.github/workflows/ci.yml'
            packaging:
              - 'packaging/**'
              - 'config/**'
              - '.github/workflows/ci.yml'
              - '.github/workflows/release.yml'
              - '.github/workflows/release-preparation.yml'

  lint-test:
    name: Lint and test
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.code == 'true' || needs.changes.outputs.packaging == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ env.CACHE_KEY_SUFFIX }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ env.CACHE_KEY_SUFFIX }}-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --workspace

      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools && rustup target add x86_64-unknown-linux-musl

      - name: Build release binary (musl)
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Smoke test binary
        run: ./target/x86_64-unknown-linux-musl/release/aish --help

      - name: Upload release binary
        uses: actions/upload-artifact@v6
        with:
          name: aish-linux-amd64
          path: target/x86_64-unknown-linux-musl/release/aish
          if-no-files-found: error

  build-bundle:
    name: Build bundle
    if: github.event_name != 'pull_request' || needs.changes.outputs.packaging == 'true'
    runs-on: ubuntu-latest
    needs:
      - changes
      - lint-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-musl-cargo-${{ env.CACHE_KEY_SUFFIX }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-musl-cargo-${{ env.CACHE_KEY_SUFFIX }}-

      - name: Build release binary
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Build bundle archive
        run: |
          VERSION="0.0.0+${GITHUB_SHA::8}"
          OUTPUT_DIR="artifacts/amd64"
          VERSION="$VERSION" PLATFORM="linux" ARCH="x86_64" OUTPUT_DIR="$OUTPUT_DIR" ./packaging/build_bundle.sh

      - name: Smoke test binary
        run: ./target/x86_64-unknown-linux-musl/release/aish --help

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v6
        with:
          name: aish-linux-amd64-bundle
          path: |
            artifacts/amd64/*
          if-no-files-found: error
